[user-account]
;配置账号密码，留空则打开网页后需手动登录
username = 
password = 

[browser-option]
;配置浏览器,可选 Edge 或 Chrome
driver = Chrome
;指定浏览器所在路径,不填则使用默认路径
EXE_PATH =

[script-option]
;是否自动过登录时的滑块验证(默认:True)
enableAutoCaptcha = True
;是否自动隐藏浏览器窗口(默认:False)
enableHideWindow = False
;是否展示赞赏码(默认:True)
showDonateCode = True

[course-option]
;限制每门课程刷课时长/min (不限制:0)
limitMaxTime = 0
;限定播放倍速 (最高:1.8)
limitSpeed = 1.0
;设置是否静音播放 (默认:True)
soundOff = True

[course-url]
;配置要学习的课程链接,支持(智慧)共享课
;可继续添加多个课程链接
URL1 =
URL2 =
URL3 =
URL4 =
URLn =

[deepseek]
;DeepSeek API密钥 (用于自动做题)
api_key = 
;模型名称 (默认: deepseek-v4-pro)
model = deepseek-v4-flash

[auto-handle-url]
;要自动完成作业的链接（能显示作业列表的界面）
;URL格式: https://ai-smart-course-student-pro.zhihuishu.com/singleCourse/taskAndExam/...
URL1 = 
